<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>TP JavaScript</title>
</head>

<body>
    <h1>Exercice X</h1>
    <!-- Votre contenu HTML ici -->

    <script>
        // Votre code JavaScript ici
        let prénom = window.prompt("Quel est votre prénom ?")
        let age = window.prompt("Quel est votre age ?")
        age = Number(age)
        let anneeNaissance = 2025 - age
        window.alert(`Bonjour ${prénom} ! Vous êtes né(e) vers ${anneeNaissance}.`)
        let afficher = window.confirm("Afficher dans la console ?")
        if (afficher == true) {
            console.log(`Prénom : ${prénom}`)
            console.log(`Age : ${age}`)
            console.log(`Année de naissance : ${anneeNaissance}`)
        }
    </script>
</body>

</html>
